<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dictionary App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Dictionary App</h1>

    <!-- SEARCH -->
    <input id="searchInput" placeholder="Type a word..." />
    <button id="searchBtn">Search</button>

    <!-- RESULT -->
    <h2 id="wordTitle"></h2>
    <p id="meaningBox">Search a word to see meaning</p>

    <!-- SAVE -->
    <button id="saveBtn">Save Word</button>

    <!-- SAVED -->
    <h3>Saved Words</h3>
    <ul id="savedList"></ul>

  </div>

  <script src="app.js"></script>
</body>
</html>
